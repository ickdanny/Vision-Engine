plugins {
    id 'java'
}

group 'circle.kaitwo'
version '1.1'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.junit.jupiter:junit-jupiter:5.4.2'
     testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

test {
    useJUnitPlatform()
}

jar {
    archiveFileName = 'VOSG.jar'
    manifest {
        attributes(
            'Main-Class': 'internalconfig.Main'
        )
    }
}